{% extends "base.html" %}
{% block title %}Register — LRT Maintenance{% endblock %}

{% block content %}
<main class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <p class="eyebrow">Singapore RailTech</p>
            <h1>Create Account</h1>
            <p class="subtitle">Register for dashboard access</p>
        </div>

        <form method="POST" class="auth-form" id="registerForm">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" required placeholder="Your full name">
            </div>

            <div class="form-group">
                <label for="user_id">User ID</label>
                <input type="text" id="user_id" name="user_id" required placeholder="Choose a user ID" pattern="[a-zA-Z0-9_]+" title="Letters, numbers, and underscores only">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your.email@company.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-field">
                    <input type="password" id="password" name="password" required minlength="8" placeholder="Min 8 chars, upper, lower, number">
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">Show</button>
                </div>
                <small class="form-hint">At least 8 characters with uppercase, lowercase, and a number</small>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <div class="password-field">
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Re-enter password">
                    <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">Show</button>
                </div>
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role">
                    <option value="operator">Operator</option>
                    <option value="maintenance">Maintenance Staff</option>
                    <option value="viewer">Viewer</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('login') }}">Already have an account? Sign in</a>
        </div>
    </div>
</main>
{% endblock %}
