{% extends "base.html" %}
{% block title %}Forgot Password — LRT Maintenance{% endblock %}

{% block content %}
<main class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <p class="eyebrow">Singapore RailTech</p>
            <h1>Reset Password</h1>
            <p class="subtitle">Enter your email to receive reset instructions</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your.email@company.com">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('login') }}">Back to sign in</a>
        </div>
    </div>
</main>
{% endblock %}
